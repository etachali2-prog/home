
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanic/Electrician Assignment Form</title>
    <style>
        /* Optional basic styling to make it look clean without <br> tags */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 200px;
            font-weight: bold;
        }
        input, textarea {
            padding: 5px;
            width: 250px;
        }
        textarea {
            vertical-align: top;
            height: 60px;
        }
    </style>
</head>
<body>

    <form action="#" method="POST">
       
        <h4>Mechanic/Electrician Assignment Form to Respond to Inspection Results</h4>
        <div class="form-group">
            <label for="assigned-by">Team Leader/Senior:</label>
            <input type="text" id="assigned-by" name="assigned_by">
        </div>

        <div class="form-group">
            <label for="assignee">Assigned Electrician/Mechanic:</label>
            <input type="text" id="assignee" name="assignee">
        </div>

        <div class="form-group">
            <label for="machine-name">Machine Name:</label>
            <input type="text" id="machine-name" name="machine_name">
        </div>

        <div class="form-group">
            <label for="location">Location:</label>
            <input type="text" id="location" name="location">
        </div>

        <div class="form-group">
            <label for="problem">Problem Encountered:</label>
            <textarea id="problem" name="problem"></textarea>
        </div>
        
        <div class="form-group">
            <button type="submit">Submit Assignment</button>
        </div>
    </form>

</body>
</html>
